<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QIU Event Caption Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>QIU Event Caption Generator</h1>
            <nav>
                <a href="/">Main Generator</a>
                <a href="/history">History</a>
            </nav>
        </header>
        
        <main class="card">
            <form id="eventForm" class="form-grid">
                <div class="form-group">
                    <label for="event_name">Event Name</label>
                    <input type="text" id="event_name" required>
                </div>

                <div class="form-group">
                    <label for="event_venue">Venue</label>
                    <input type="text" id="event_venue" required>
                </div>

                <div class="form-group">
                    <label for="date_from">Date (From)</label>
                    <input type="date" id="date_from" required>
                </div>

                <div class="form-group">
                    <label for="date_to">Date (To)</label>
                    <input type="date" id="date_to" required>
                </div>

                <div class="form-group">
                    <label for="time_from">Time (From)</label>
                    <input type="time" id="time_from" required>
                </div>

                <div class="form-group">
                    <label for="time_to">Time (To)</label>
                    <input type="time" id="time_to" required>
                </div>

                <div class="form-group">
                    <label for="tone">Tone</label>
                    <select id="tone">
                        <option value="Casual">Casual</option>
                        <option value="Urgency">Urgency</option>
                        <option value="Promotional" selected>Promotional</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="min_words">Min Words</label>
                    <input type="number" id="min_words" min="5" value="10" required>
                </div>

                <div class="form-group">
                    <label for="add_on_text">Add-On Text</label>
                    <input type="text" id="add_on_text" placeholder="e.g., Free Entry">
                </div>

                <button type="submit" class="btn btn-primary">Generate</button>
            </form>

            <section id="resultSection" class="results">
                <h2>Generated Captions</h2>
                <div id="captions"></div>
                <h2>Generated Headlines</h2>
                <div id="headlines"></div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='event_script.js') }}"></script>
</body>
</html>
